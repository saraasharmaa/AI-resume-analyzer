<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resume Analyzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }
  .container { max-width: 780px; margin: 0 auto; padding: 36px 16px; }
  h1 { font-size: 24px; font-weight: bold; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; }
  .label { font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  textarea { width: 100%; border: 1px solid #ccc; border-radius: 8px; padding: 10px 12px; font-size: 13px; resize: vertical; min-height: 130px; margin-bottom: 16px; font-family: Arial, sans-serif; background: #fff; }
  textarea:focus { outline: none; border-color: #555; }
  button { width: 100%; padding: 13px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; font-family: Arial, sans-serif; transition: background 0.15s; }
  button:hover { background: #333; }
  button:disabled { background: #999; cursor: not-allowed; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px 18px; margin-top: 16px; }
  .card h3 { font-size: 13px; font-weight: bold; margin-bottom: 10px; color: #111; }
  .badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; }
  .green  { background: #e8f5e9; color: #2e7d32; }
  .blue   { background: #e3f2fd; color: #1565c0; }
  .orange { background: #fff3e0; color: #e65100; }
  .red    { background: #ffebee; color: #b71c1c; }
  .purple { background: #ede7f6; color: #4527a0; }
  .score-big { font-size: 30px; font-weight: bold; }
  .bar-wrap  { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .bar-label { font-size: 12px; color: #555; width: 160px; flex-shrink: 0; }
  .bar-bg    { flex: 1; background: #f0f0f0; border-radius: 4px; height: 8px; }
  .bar-fill  { height: 8px; border-radius: 4px; transition: width 0.4s ease; }
  .bar-num   { font-size: 12px; font-weight: bold; width: 30px; text-align: right; flex-shrink: 0; }
  .tag { display: block; padding: 8px 11px; border-radius: 8px; font-size: 13px; margin: 5px 0; line-height: 1.5; }
  .signal-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
  .pill { font-size: 12px; padding: 4px 11px; border-radius: 20px; }
  .err  { background: #ffebee; color: #b71c1c; border-radius: 8px; padding: 12px; margin-top: 14px; font-size: 13px; }
  .top-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .reasoning { font-size: 13px; line-height: 1.75; color: #555; margin-top: 8px; }
  .section-divider { font-size: 11px; font-weight: bold; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin: 6px 0 4px; }
  .match-note { font-size: 12px; color: #777; background: #f9f9f9; border-radius: 6px; padding: 8px 10px; margin-top: 8px; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">

  <h1>Resume Analyzer</h1>
  <p class="subtitle">Paste any resume and job description — get a structured, signal-based candidate evaluation for any role.</p>

  <div class="label">Resume</div>
  <textarea id="res" placeholder="Paste the candidate's full resume here..."></textarea>

  <div class="label">Job Description</div>
  <textarea id="jd" placeholder="Paste the job description here..."></textarea>

  <button id="btn" onclick="go()">Analyze Resume</button>

  <div id="err" class="err" style="display:none;"></div>
  <div id="out"></div>

</div>

<script>
function barColor(s) {
  return s >= 70 ? '#43a047' : s >= 48 ? '#fb8c00' : '#e53935';
}

function count(text, patterns) {
  let n = 0;
  patterns.forEach(p => {
    try { const m = text.match(new RegExp(p, 'gi')); if (m) n += m.length; } catch(e) {}
  });
  return n;
}

// Extract keywords from JD to check resume alignment
function extractJDKeywords(jd) {
  const stop = new Set(['the','and','or','for','with','that','this','are','was','will','have','has','can','our','your','you','we','in','of','to','a','an','be','is','as','at','by','on','it','its','from','their','they','all','also','not','but','any','who','which','how','what','more','most','other','into','than','then','these','those','been','being','each','such','when','where','both','about','after','before','between','through','during','while','within','without','across','along','around','between','per','via','only','just','very','much','many','some','few','same','own','so','up','out','if','do','did','does','use','used','using','make','made','work','working','team','teams','role','roles','job','position','company','based','new','high','large','strong','good','great','best','well','able','need','needs','required','requirements','responsibilities','experience','years','knowledge','skills','skill','ability','understanding','including','related','relevant']);
  const words = jd.toLowerCase().match(/\b[a-z][a-z0-9+#.\-]{2,}\b/g) || [];
  const freq = {};
  words.forEach(w => { if (!stop.has(w)) freq[w] = (freq[w] || 0) + 1; });
  return Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0, 40).map(e => e[0]);
}

function jdAlignmentScore(resumeLower, jdKeywords) {
  if (!jdKeywords.length) return 50;
  let hits = 0;
  jdKeywords.forEach(kw => {
    if (resumeLower.includes(kw)) hits++;
  });
  return Math.min(100, Math.round((hits / jdKeywords.length) * 100 * 1.4));
}

function analyze(resume, jd) {
  const r = resume.toLowerCase();
  const j = jd.toLowerCase();

  // --- JD-based alignment ---
  const jdKeywords = extractJDKeywords(jd);
  const jdMatchScore = jdAlignmentScore(r, jdKeywords);
  const topMatchedKw = jdKeywords.filter(k => r.includes(k)).slice(0, 6);
  const topMissingKw = jdKeywords.filter(k => !r.includes(k)).slice(0, 5);

  // --- Build / Execution signals ---
  const buildVerbs = count(r, ['\\bbuilt\\b','\\bshipped\\b','\\bdeployed\\b','\\blaunched\\b','\\bdeveloped\\b','\\bcreated\\b','\\bimplemented\\b','\\barchitected\\b','\\bdelivered\\b','\\breleased\\b','\\bintegrated\\b','\\bautomated\\b','\\bscaled\\b','\\boptimized\\b','\\bled\\b','\\bowned\\b','\\bdrove\\b','\\bdesigned\\b','\\bpublished\\b','\\bmigrated\\b','\\brefactored\\b','\\bmanaged\\b','\\bcoordinated\\b','\\bestablished\\b','\\bexecuted\\b','\\bspearheaded\\b','\\binitiated\\b','\\bfacilitated\\b','\\boversaw\\b','\\bconducted\\b','\\bproduced\\b','\\bgenerated\\b','\\benabled\\b','\\bstreamlined\\b']);

  const speedWords = count(r, ['\\brapid\\b','\\bquickly\\b','\\bfast\\b','\\b48.?hour\\b','\\b1.?day\\b','\\b2.?day\\b','\\bprototype\\b','\\bmvp\\b','\\bpoc\\b','\\bhackathon\\b','\\bsprint\\b','\\biterat\\b','\\bend.?to.?end\\b','\\bfrom.?scratch\\b','\\bsolo\\b','\\bindependently\\b','\\bzero.?to\\b','\\bdeadline\\b','\\bon.?time\\b','\\bon.?schedule\\b']);

  const projectRefs = count(r, ['\\bproject\\b','\\bsystem\\b','\\bplatform\\b','\\btool\\b','\\bapp\\b','\\bapplication\\b','\\bservice\\b','\\bpipeline\\b','\\bworkflow\\b','\\bdashboard\\b','\\bapi\\b','\\bbot\\b','\\bagent\\b','\\bmodule\\b','\\bfeature\\b','\\bproduct\\b','\\bsolution\\b','\\binitiative\\b','\\bprogram\\b','\\bcampaign\\b']);

  // --- Technical skills (broad, role-agnostic) ---
  const techSkills = count(r, ['\\bpython\\b','\\bjavascript\\b','\\btypescript\\b','\\bjava\\b','\\bc\\+\\+\\b','\\bc#\\b','\\brust\\b','\\bgo\\b','\\bsql\\b','\\bnosql\\b','\\breact\\b','\\bnode\\b','\\baws\\b','\\bazure\\b','\\bgcp\\b','\\bdocker\\b','\\bkubernetes\\b','\\bgit\\b','\\blinux\\b','\\brest\\b','\\bgraphql\\b','\\bmicroservice\\b','\\bcloud\\b','\\bdevops\\b','\\bci.?cd\\b','\\bml\\b','\\bai\\b','\\bllm\\b','\\bgpt\\b','\\blangchain\\b','\\brag\\b','\\bembedding\\b','\\bvector\\b','\\bnlp\\b','\\btensorflow\\b','\\bpytorch\\b','\\bscikit\\b','\\bpandas\\b','\\bnumpy\\b','\\bsparkb\\b','\\bkafka\\b','\\bredis\\b','\\bpostgres\\b','\\bmongodb\\b','\\bfigma\\b','\\bsalesforce\\b','\\bjira\\b','\\bexcel\\b','\\bpowerbi\\b','\\btableau\\b','\\bsap\\b']);

  // --- Impact / Outcomes ---
  const metrics = count(r, ['\\d+\\s*%','\\d+x\\b','\\d+\\s*times','\\d+\\s*users','\\d+\\s*customers','\\d+\\s*clients','\\d+\\s*requests','\\d+\\s*ms\\b','\\d+\\s*seconds','\\d+\\s*hours','\\d+k\\b','\\d+m\\b','\\d+\\s*million','\\d+\\s*thousand','\\d+\\s*queries','\\d+\\s*records','\\d+\\s*gb\\b','\\d+\\s*tb\\b','\\d+\\s*team','\\$\\d+','\\d+\\s*revenue','\\d+\\s*deals','\\d+\\s*leads','\\d+\\s*sales']);

  const impactWords = count(r, ['\\breduced\\b','\\bincreased\\b','\\bimproved\\b','\\bsaved\\b','\\bcut\\b','\\bboosted\\b','\\bgrew\\b','\\baccelerated\\b','\\benabled\\b','\\bscaled\\b','\\bgenerated\\b','\\bachieved\\b','\\beliminated\\b','\\bmaximized\\b','\\bminimized\\b','\\bexceeded\\b','\\bsurpassed\\b','\\bwon\\b','\\bclosed\\b','\\bsecured\\b','\\bdriven\\b']);

  // --- Problem solving ---
  const problemSignals = count(r, ['\\bsolved\\b','\\bsolution\\b','\\bchallenge\\b','\\bproblem\\b','\\bbottleneck\\b','\\broot.?cause\\b','\\bdebug\\b','\\bdiagnos\\b','\\brefactor\\b','\\bredesign\\b','\\bidentified\\b','\\binvestigated\\b','\\banalyzed\\b','\\bproposed\\b','\\bambiguous\\b','\\bcritical.?thinking\\b','\\bstrategic\\b','\\binnovated\\b','\\bpioneered\\b']);

  // --- Communication / Clarity ---
  const commSignals = count(r, ['\\bpresented\\b','\\bcommunicated\\b','\\breported\\b','\\bdocumented\\b','\\bpublished\\b','\\bwrote\\b','\\btrained\\b','\\bmentored\\b','\\bcoached\\b','\\bstakeholder\\b','\\bclient\\b','\\bcross.?functional\\b','\\bcollaborated\\b','\\bnegotiated\\b','\\bpitched\\b','\\binfluenced\\b']);

  // --- Scoring ---
  const lines = resume.split('\n').filter(l => l.trim().length > 0).length;

  // Relevance to JD (weighted heavily)
  const relevanceScore = jdMatchScore;

  // Skills breadth
  const skillsScore = Math.min(100, 10 + techSkills * 4 + (lines > 15 ? 10 : 0));

  // Execution
  const exScore = Math.min(100, 15 + buildVerbs * 4 + speedWords * 6 + projectRefs * 2);

  // Impact
  const impScore = Math.min(100, 10 + metrics * 12 + impactWords * 4);

  // Communication & clarity
  const clScore = Math.min(100, 20 + commSignals * 5 + (lines > 10 ? 15 : 0) + (resume.length > 600 ? 10 : 0) + (resume.length > 1200 ? 10 : 0) + Math.min(15, buildVerbs * 2));

  // Weighted overall — relevance and impact are heaviest
  const overall = Math.round(
    relevanceScore * 0.30 +
    exScore        * 0.20 +
    impScore       * 0.25 +
    skillsScore    * 0.15 +
    clScore        * 0.10
  );

  const verdict = overall >= 78 ? 'Strong Match' : overall >= 62 ? 'Good Match' : overall >= 45 ? 'Partial Match' : 'Low Match';
  const vclass  = overall >= 78 ? 'green' : overall >= 62 ? 'blue' : overall >= 45 ? 'orange' : 'red';
  const il      = overall >= 72 ? 'High' : overall >= 52 ? 'Medium' : 'Low';
  const ilclass = il === 'High' ? 'green' : il === 'Medium' ? 'orange' : 'red';

  // Strengths
  const strengths = [];
  if (jdMatchScore >= 60) strengths.push('Strong JD alignment — ' + topMatchedKw.length + ' key role requirements matched in resume');
  if (buildVerbs >= 5)    strengths.push('Active builder — ' + buildVerbs + ' execution verbs (built, led, delivered, managed, etc.)');
  if (metrics >= 3)       strengths.push('Quantified outcomes — ' + metrics + ' metric(s) with concrete numbers');
  if (techSkills >= 5)    strengths.push('Broad technical or domain skill set — ' + techSkills + ' skills detected');
  if (impactWords >= 4)   strengths.push('Impact-oriented language — focuses on outcomes, not just responsibilities');
  if (commSignals >= 3)   strengths.push('Communication & collaboration signals — stakeholder, cross-functional, mentoring');
  if (speedWords >= 2)    strengths.push('Delivery speed signals — MVPs, sprints, deadlines, independent execution');
  if (!strengths.length)  strengths.push('Resume submitted — signals are limited, recommend manual review');

  // Weaknesses
  const weaknesses = [];
  if (jdMatchScore < 50)  weaknesses.push('Low JD alignment — many key role keywords missing from resume');
  if (metrics < 2)        weaknesses.push('Missing quantified impact — add numbers: %, revenue, users, time saved, team size');
  if (buildVerbs < 4)     weaknesses.push('Weak action verbs — replace passive language with: led, built, delivered, drove');
  if (commSignals < 2)    weaknesses.push('Limited communication signals — add stakeholder, collaboration, or presentation experience');
  if (techSkills < 3)     weaknesses.push('Few technical or domain skills detected — ensure tools and technologies are listed clearly');

  // Improvements
  const improvements = [
    topMissingKw.length ? 'Add these JD keywords naturally into your resume: ' + topMissingKw.join(', ') : 'Good keyword coverage — ensure context matches the role',
    metrics < 3 ? 'Quantify every achievement — even rough numbers work: "saved 5 hrs/week", "grew pipeline by 30%"' : 'Good metrics — tie each number to a business outcome',
    'Start every bullet: [Action Verb] + [What you did] + [Result or impact]',
    'Tailor your summary/objective to directly mirror the role\'s top 2-3 requirements'
  ];

  const reasoning = `Resume matched ${topMatchedKw.length} of the top JD keywords (score: ${jdMatchScore}/100). Detected ${buildVerbs} action verbs, ${metrics} quantified metric(s), and ${techSkills} skill references. ${jdMatchScore >= 60 ? 'Strong role alignment.' : 'Resume needs better tailoring to this specific JD.'} ${metrics < 2 ? 'Biggest gap is lack of measurable outcomes.' : 'Impact evidence is present which strengthens the candidacy.'} Overall match score: ${overall}/100 → ${verdict}.`;

  return {
    overall, verdict, vclass, il, ilclass,
    dims: [
      { label: 'JD relevance',       score: Math.round(relevanceScore) },
      { label: 'Execution & output', score: Math.round(exScore)        },
      { label: 'Real-world impact',  score: Math.round(impScore)       },
      { label: 'Skills coverage',    score: Math.round(skillsScore)    },
      { label: 'Clarity & comms',    score: Math.round(clScore)        }
    ],
    strengths, weaknesses, improvements, reasoning,
    topMatchedKw, topMissingKw,
    signals: { buildVerbs, speedWords, metrics, techSkills, commSignals, projectRefs, jdMatchScore }
  };
}

function go() {
  const resume = document.getElementById('res').value.trim();
  const jd     = document.getElementById('jd').value.trim();
  const err    = document.getElementById('err');
  const out    = document.getElementById('out');
  const btn    = document.getElementById('btn');

  err.style.display = 'none';
  out.innerHTML = '';

  if (!resume || !jd) {
    err.textContent = 'Please paste both a resume and a job description.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Analyzing...';

  setTimeout(() => {
    try {
      const r = analyze(resume, jd);
      const s = r.signals;

      out.innerHTML = `
        <div class="card">
          <div class="top-row">
            <span class="badge ${r.vclass}">${r.verdict}</span>
            <span class="badge ${r.ilclass}">Interview Fit: ${r.il}</span>
            <span class="score-big" style="margin-left:auto;">${r.overall}<span style="font-size:15px;font-weight:normal;color:#666;">/100</span></span>
          </div>
          <div class="reasoning">${r.reasoning}</div>
        </div>

        <div class="card">
          <h3>Dimension Scores</h3>
          ${r.dims.map(d => `
            <div class="bar-wrap">
              <span class="bar-label">${d.label}</span>
              <div class="bar-bg"><div class="bar-fill" style="width:${d.score}%;background:${barColor(d.score)};"></div></div>
              <span class="bar-num" style="color:${barColor(d.score)};">${d.score}</span>
            </div>`).join('')}
        </div>

        <div class="card">
          <h3>JD Keyword Match</h3>
          ${r.topMatchedKw.length ? `
            <div class="section-divider">Matched</div>
            <div class="signal-row">${r.topMatchedKw.map(k => `<span class="pill green">${k}</span>`).join('')}</div>` : ''}
          ${r.topMissingKw.length ? `
            <div class="section-divider" style="margin-top:10px;">Missing from resume</div>
            <div class="signal-row">${r.topMissingKw.map(k => `<span class="pill red">${k}</span>`).join('')}</div>` : ''}
        </div>

        <div class="card">
          <h3>Signal Breakdown</h3>
          <div class="signal-row">
            <span class="pill" style="background:#e3f2fd;color:#1565c0;">Action verbs: ${s.buildVerbs}</span>
            <span class="pill" style="background:#e3f2fd;color:#1565c0;">Speed signals: ${s.speedWords}</span>
            <span class="pill" style="background:#e8f5e9;color:#2e7d32;">Metrics: ${s.metrics}</span>
            <span class="pill" style="background:#ede7f6;color:#4527a0;">Skills detected: ${s.techSkills}</span>
            <span class="pill" style="background:#fff3e0;color:#e65100;">Comm signals: ${s.commSignals}</span>
            <span class="pill" style="background:#f3f3f3;color:#333;">Project refs: ${s.projectRefs}</span>
            <span class="pill" style="background:#e8f5e9;color:#2e7d32;">JD match: ${s.jdMatchScore}%</span>
          </div>
        </div>

        <div class="card">
          <h3>Strengths</h3>
          ${r.strengths.map(x => `<div class="tag" style="background:#e8f5e9;color:#2e7d32;">${x}</div>`).join('')}
        </div>

        <div class="card">
          <h3>Weaknesses</h3>
          ${r.weaknesses.length
            ? r.weaknesses.map(x => `<div class="tag" style="background:#ffebee;color:#b71c1c;">${x}</div>`).join('')
            : '<div class="tag" style="background:#e8f5e9;color:#2e7d32;">No major gaps detected</div>'}
        </div>

        <div class="card">
          <h3>Improvements</h3>
          ${r.improvements.map(x => `<div class="tag" style="background:#fff3e0;color:#e65100;">${x}</div>`).join('')}
        </div>`;

      out.scrollIntoView({ behavior: 'smooth' });
    } catch(e) {
      err.textContent = 'Analysis error: ' + e.message;
      err.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Analyze Resume';
  }, 120);
}
</script>
</body>
</html>
